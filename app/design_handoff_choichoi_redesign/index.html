<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ChoiChoi POS — Responsive Redesign</title>

<!-- Pretendard (matches globals.css) -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" as="style"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

<!-- Tailwind v4 (browser CDN — same family as the repo's tailwind v4 + @theme) -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- Mirror the repo's @theme tokens so primary-* color names work -->
<style type="text/tailwindcss">
  @theme {
    --color-primary-50:  #e6f4ee;
    --color-primary-100: #b8deca;
    --color-primary-600: #0a5239;
    --color-primary-700: #084431;
    --color-primary-800: #063424;
  }
</style>

<style>
  html, body { margin: 0; padding: 0; background: #ECEEF1; }
  body {
    font-family: 'Pretendard Variable', Pretendard, 'Noto Sans KR',
                 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: #161616;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  /* Hide scrollbars inside device viewports so chrome doesn't distract */
  .device-scroll::-webkit-scrollbar { width: 0; height: 0; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="src/devices.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
<script type="text/babel" src="src/inventory.jsx"></script>

<script type="text/babel" data-presets="env,react">
  // Each screen rendered at 3 device sizes. The SAME React tree reflows
  // because container queries (@2xl, @5xl) react to each device's own width.
  //
  // iPhone 15 Pro Max → 430pt → triggers @sm, @md, @lg, @xl only
  // iPad Pro 11"     → 834pt → triggers up to @3xl (cart side-panel kicks in)
  // MacBook Pro 14"  → 1512pt → triggers up to @7xl (4-col menu grid + sticky cart)

  const renderScreen = (Screen) => ({
    phone:   <IPhone>  <Screen /> </IPhone>,
    tablet:  <IPad>    <Screen /> </IPad>,
    laptop:  <MacBook> <Screen /> </MacBook>,
  });

  const SCREENS = [
    { id: 'pos',      title: 'POS · 캐셔 화면',     subtitle: '/pos · 같은 컴포넌트, 컨테이너 쿼리로 자동 반응',     Comp: ScreenPOS },
    { id: 'display',  title: 'Display · 고객 화면', subtitle: '/display · POS와 Supabase 브로드캐스트로 동기화',    Comp: ScreenDisplay },
    { id: 'orders',   title: '주문 현황',           subtitle: '/orders · 1 / 2 / 3 컬럼 카드 그리드',               Comp: ScreenOrders },
    { id: 'inventory',title: '재고관리',            subtitle: '/inventory · 레시피 × 재고 → 잔여 제작 가능 개수',   Comp: ScreenInventory },
    { id: 'stats',    title: '통계',                subtitle: '/stats · 매출 카드 + 메뉴별 + 주간 + 시간대',         Comp: ScreenStats },
    { id: 'settings', title: '설정',                subtitle: '/settings · 메뉴 CRUD · 8색 팔레트',                Comp: ScreenSettings },
    { id: 'memo',     title: '메모',                subtitle: '/memo · 1 / 2 / 3 / 4 컬럼 그리드 (auto-fill)',     Comp: ScreenMemo },
  ];

  const App = () => (
    <DesignCanvas
      title="ChoiChoi POS — 반응형 재설계"
      subtitle="실제 코드(Tailwind v4 + primary-700 forest green)에 기반한 단일 컴포넌트 트리 · 디바이스마다 컨테이너 쿼리로 자동 반응">
      {SCREENS.map(({ id, title, subtitle, Comp }) => {
        const r = renderScreen(Comp);
        return (
          <DCSection key={id} id={id} title={title} subtitle={subtitle}>
            <DCArtboard id={`${id}-phone`}  label="iPhone 15 Pro Max · 430 × 932" width={462} height={964}>
              {r.phone}
            </DCArtboard>
            <DCArtboard id={`${id}-tablet`} label="iPad Pro 11ʺ · 1194 × 834 (가로)" width={1228} height={868}>
              {r.tablet}
            </DCArtboard>
            <DCArtboard id={`${id}-laptop`} label="MacBook Pro 14ʺ · 1512 × 982" width={1528} height={1022}>
              {r.laptop}
            </DCArtboard>
          </DCSection>
        );
      })}
    </DesignCanvas>
  );

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
